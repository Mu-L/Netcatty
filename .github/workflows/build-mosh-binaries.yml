name: build-mosh-binaries

on:
  workflow_dispatch:
    inputs:
      mosh_ref:
        description: "mosh upstream git ref (tag/branch/commit) — see https://github.com/mobile-shell/mosh"
        type: string
        default: "mosh-1.4.0"
      release_tag:
        description: "Optional release tag to attach binaries to (e.g. mosh-bin-1.4.0-1). Empty = artifacts only."
        type: string
        default: ""
  push:
    tags:
      - "mosh-bin-*"

env:
  MOSH_REF: ${{ inputs.mosh_ref || 'mosh-1.4.0' }}

jobs:
  # ------------------------------------------------------------------
  # Linux x64 (manylinux2014 / glibc 2.17, broad distro compatibility).
  # Static-links OpenSSL, protobuf, ncurses; libstdc++ and libgcc.
  # Resulting mosh-client only depends on the glibc runtime.
  # ------------------------------------------------------------------
  build-linux-x64:
    name: build-linux-x64
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Build mosh-client (linux-x64)
        env:
          MOSH_REF: ${{ env.MOSH_REF }}
          OUT_DIR: ${{ github.workspace }}/out
          ARCH: x64
        run: bash scripts/build-mosh/build-linux.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-client-linux-x64
          path: out/

  build-linux-arm64:
    name: build-linux-arm64
    runs-on: ubuntu-24.04-arm
    container:
      image: quay.io/pypa/manylinux2014_aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Build mosh-client (linux-arm64)
        env:
          MOSH_REF: ${{ env.MOSH_REF }}
          OUT_DIR: ${{ github.workspace }}/out
          ARCH: arm64
        run: bash scripts/build-mosh/build-linux.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-client-linux-arm64
          path: out/

  # ------------------------------------------------------------------
  # macOS universal2 (arm64 + x86_64 lipo).
  # Min deployment target: macOS 11 (Big Sur) — covers arm64 hardware.
  # Static-links OpenSSL, protobuf, ncurses for both arches.
  # ------------------------------------------------------------------
  build-macos-universal:
    name: build-macos-universal
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Build mosh-client (darwin-universal)
        env:
          MOSH_REF: ${{ env.MOSH_REF }}
          OUT_DIR: ${{ github.workspace }}/out
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: bash scripts/build-mosh/build-macos.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-client-darwin-universal
          path: out/

  # ------------------------------------------------------------------
  # Windows x64.
  # Phase 1 (this PR): pin to the FluentTerminal-shipped mosh-cygwin
  #   standalone build (GPL-3.0, no cygwin1.dll needed). Verified by
  #   SHA256 against a known commit of felixse/FluentTerminal.
  # Phase 2 (follow-up): replace with an in-CI Cygwin static build
  #   from upstream mobile-shell/mosh source.
  # ------------------------------------------------------------------
  fetch-windows-x64:
    name: fetch-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch mosh-client.exe (win32-x64)
        env:
          OUT_DIR: ${{ github.workspace }}/out
        run: bash scripts/build-mosh/fetch-windows.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosh-client-win32-x64
          path: out/

  # ------------------------------------------------------------------
  # Aggregate + (optional) GitHub Release.
  # ------------------------------------------------------------------
  release:
    name: release
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-universal
      - fetch-windows-x64
    runs-on: ubuntu-latest
    if: ${{ inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/mosh-bin-') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          for d in artifacts/*/; do
            cp -r "$d"/* release/
          done
          (cd release && sha256sum * > SHA256SUMS)
          ls -la release
          cat release/SHA256SUMS
      - name: Determine tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: release/*
          body: |
            Pre-built `mosh-client` binaries consumed by `scripts/fetch-mosh-binaries.cjs`
            during `npm run pack`. Built from `mobile-shell/mosh` upstream ref `${{ env.MOSH_REF }}`.

            All artifacts are GPL-3.0; see `resources/mosh/README.md` for source provenance.
          draft: false
          prerelease: false
